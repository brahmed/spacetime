name: backoffice
description: SpaceTime web back office for admins.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Shared packages
  core:
    path: ../../packages/core
  ui:
    path: ../../packages/ui
  supabase_client:
    path: ../../packages/supabase

  # Localisation
  flutter_localizations:
    sdk: flutter
  intl: any

  # Supabase (direct dep for auth session access in router)
  supabase_flutter: ^2.7.0

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
